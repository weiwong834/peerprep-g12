<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PeerPrep Matching Test UI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>PeerPrep Matching Test UI</h1>
      <p class="subtitle">Open two tabs with different user IDs to simulate real matching.</p>

      <section class="card">
        <h2>Connection</h2>
        <div class="row">
          <label for="serverUrl">Socket URL</label>
          <input id="serverUrl" value="http://localhost:3002" />
        </div>
        <div class="row">
          <label for="userId">User ID</label>
          <input id="userId" placeholder="e.g. user-alice" />
        </div>
        <div class="actions">
          <button id="connectBtn">Connect</button>
          <button id="disconnectBtn" class="secondary">Disconnect</button>
        </div>
        <p id="connectionStatus" class="status disconnected">Disconnected</p>
      </section>

      <section class="card">
        <h2>Match Request</h2>
        <div class="grid">
          <div class="row">
            <label for="topic">Topic</label>
            <select id="topic"></select>
          </div>
          <div class="row">
            <label for="difficulty">Difficulty</label>
            <select id="difficulty">
              <option value="easy">easy</option>
              <option value="medium" selected>medium</option>
              <option value="hard">hard</option>
            </select>
          </div>
          <div class="row">
            <label for="language">Language</label>
            <select id="language">
              <option value="javascript" selected>javascript</option>
              <option value="python">python</option>
              <option value="java">java</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <button id="findMatchBtn">Find Match</button>
          <button id="cancelBtn" class="danger">Cancel Request</button>
        </div>
        <div class="actions">
          <button id="confirmBtn" class="success">Confirm Imperfect Match</button>
          <button id="declineBtn" class="danger">Decline Imperfect Match</button>
        </div>
      </section>

      <section class="card">
        <h2>Event Log</h2>
        <pre id="logPanel"></pre>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>
    <script src="./app.js"></script>
  </body>
</html>
